<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Office Badminton Auction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/console.css">
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">High Performance Team · Live Auction</div>
      <h1>EPT Badminton League 2026</h1>
    </div>
    <div class="header-now-bidding empty" id="nowBidding">
      <div class="nb-label">Now bidding</div>
      <div class="nb-name">—</div>
      <div class="nb-meta">&nbsp;</div>
    </div>
    <div class="header-right">
      <div class="ticker" id="ticker"><span>No sales yet — first lot is on the table.</span></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;">
        <div class="lan-ip" id="lanIp"></div>
        <div class="viewer-count none" id="viewerCount"><span class="vc-dot"></span><span id="viewerNum">0</span> viewing</div>
        <div class="theme-toggle" id="themeToggle">
          <span class="tt-label">Theme</span>
          <button class="tt-btn" data-theme="court">Court</button>
          <button class="tt-btn" data-theme="bosch">Bosch</button>
          <button class="tt-btn" data-theme="stage">Stage</button>
        </div>
      </div>
    </div>
  </header>

  <div class="layout">
    <div class="main">
      <div class="console">
        <div class="console-row">
          <div class="field field-team">
            <label for="teamSelect">Team</label>
            <select id="teamSelect"></select>
            <div class="field-sub" id="teamWarn"></div>
          </div>
          <div class="field field-player">
            <label for="playerSelect">Player</label>
            <select id="playerSelect"></select>
            <div class="field-sub" id="baseHint"></div>
          </div>
          <div class="field field-cost">
            <label for="playerCost">Tokens</label>
            <input type="number" id="playerCost" placeholder="0" min="0" step="50">
          </div>
          <div class="console-actions-inline">
            <button class="btn" id="confirmBtn">Confirm Sale</button>
            <div class="console-divider"></div>
            <button class="btn secondary sm" id="undoBtn">Undo</button>
            <a class="btn secondary sm" id="exportBtn" href="/api/export">Export</a>
            <button class="btn secondary sm danger" id="resetBtn">Reset</button>
          </div>
        </div>
        <div class="console-msg" id="consoleMsg"></div>
      </div>

      <div class="summary-bar">
        <div>Teams filled: <b id="sumFilled">0/10</b></div>
        <div>Players sold: <b id="sumSold">0/30</b></div>
        <div>Tokens spent: <b id="sumSpent">0</b></div>
        <div>Tokens unspent: <b id="sumLeft">250000</b></div>
      </div>

      <div class="teams" id="teamGrid"></div>
    </div>

    <aside class="sidebar">
      <div class="pool-panel">
        <h2>All Players</h2>
        <ul class="pool-list" id="poolList"></ul>
      </div>
    </aside>
  </div>

  <footer><span class="footer-credit">Made with care, passion and love by Shaman Bhat BU</span></footer>
</div>

<script src="/static/console.js"></script>
</body>
</html>
